name: Build & Error Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        id: build
        run: |
          ./gradlew build 2>&1 | tee build-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Capture errors to error.txt
        if: always()
        run: |
          if [ -f build-output.txt ]; then
            # Extract error lines
            grep -i -E "(error|FAILURE|BUILD FAILED|exception|compilation)" build-output.txt > error.txt || true
            # If no errors found, add success message
            if [ ! -s error.txt ]; then
              echo "BUILD SUCCESSFUL - No errors found" > error.txt
            fi
          else
            echo "Build output file not found" > error.txt
          fi

      - name: Upload error.txt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: error.txt

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mod-artifacts
          path: build/libs/

      - name: Fail if build failed
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "BUILD FAILED - check error.txt artifact"
          cat error.txt
          exit 1
